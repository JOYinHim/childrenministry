<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TK Trans2 - Upload 사진 업로드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-md border border-gray-100">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-yellow-100 text-yellow-600 mb-3 text-2xl">
                <i class="fas fa-cloud-upload-alt"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-900">Foto Upload</h2>
            <p class="text-xs text-gray-500 mt-1">Pilih Kegiatan dan unggah foto.</p>
        </div>

        <form id="uploadForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">1. Pilih Acara</label>
                <select id="eventSelect" class="w-full rounded-xl border border-gray-200 p-3 text-sm bg-gray-50 focus:outline-none focus:border-yellow-500" required>
                    <option value="">-- Loading... --</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">2. Pilih Foto</label>
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:bg-gray-50 transition cursor-pointer relative">
                    <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" required>
                    <i class="fas fa-image text-gray-300 text-3xl mb-1"></i>
                    <p id="fileName" class="text-xs text-gray-500">Pilih foto untuk diunggah</p>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2">3. Kata Sandi Guru</label>
                <input type="password" id="teacherPassword" class="w-full rounded-xl border border-gray-200 p-3 text-sm bg-gray-50 focus:outline-none focus:border-yellow-500" placeholder="Masukkan kata sandi guru" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-950 font-bold p-3 rounded-xl transition shadow-sm text-sm">
                Transfer ke Google Drive
            </button>
        </form>

        <div id="statusMessage" class="mt-4 text-center text-xs font-semibold hidden"></div>
    </div>

    <script>
        // 페이지 로드 시 구글 드라이브의 폴더 목록을 읽어와 드롭다운에 채움
        document.addEventListener('DOMContentLoaded', () => {
            google.script.run.withSuccessHandler(list => {
                const select = document.getElementById('eventSelect');
                select.innerHTML = '<option value="">-- Pilih Acara --</option>';
                list.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name; opt.textContent = name;
                    select.appendChild(opt);
                });
            }).getEventList();
        });

        // 파일 선택 시 파일명 표시 변경
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) document.getElementById('fileName').textContent = file.name;
        });

        // 폼 제출 프로세스 (Base64 인코딩 후 GAS 백엔드로 전송)
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMessage');
            const file = document.getElementById('fileInput').files[0];
            const eventName = document.getElementById('eventSelect').value;
            const password = document.getElementById('teacherPassword').value;

            btn.disabled = true;
            btn.textContent = "Sedang mengunggah... (Uploading...)";

            // 💡 입력된 패스워드 값을 가져옵니다.
            const password = document.getElementById('teacherPassword').value;
            
            status.className = "mt-4 text-center text-xs font-semibold text-blue-600";
            status.textContent = "Sekarang menyimpan foto ke Google Drive.";
            status.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(f) {
                google.script.run
                    .withSuccessHandler(res => {
                        btn.disabled = false;
                        btn.textContent = "Transfer ke Google Drive";
                        if(res.success) {
                            status.className = "mt-4 text-center text-xs font-semibold text-green-600";
                            status.textContent = "✅ Foto berhasil diunggah!";
                            document.getElementById('uploadForm').reset();
                            document.getElementById('fileName').textContent = "Pilih foto untuk diunggah";
                        } else {
                            status.className = "mt-4 text-center text-xs font-semibold text-red-600";
                            status.textContent = "❌ Gagal: " + res.error;
                        }
                    })
                    .uploadFile(f.target.result, eventName, file.name, password); // 패스워드 검증 연동 완료
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
