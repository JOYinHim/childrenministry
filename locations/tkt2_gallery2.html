<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Trans 2 - Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex flex-wrap items-center gap-4">
                <a href="../index.html" class="font-bold text-xl text-blue-600 hover:text-blue-800 transition">BBG Children Ministry</a>
                <a href="tkt2_about.html" class="inline-flex items-center gap-2 rounded-full border border-indigo-300 bg-white px-4 py-2 text-sm font-semibold text-indigo-800 shadow-sm hover:bg-indigo-100 transition">
                    <i class="fas fa-school"></i>
                    <span>TK Trans 2</span>
                </a>
                <div class="flex flex-wrap items-center gap-4 rounded-full bg-indigo-500 px-3 py-2 text-sm font-bold text-white">
                    <a href="tkt2_about.html" class="hover:text-white transition px-1">ABOUT</a>
                    <a href="tkt2_program.html" class="hover:text-white transition px-1">PROGRAM</a>
                    <a href="tkt2_gallery.html" class="border-b-2 border-white px-1">GALLERY</a>
                </div>
            </div>
            <div class="space-x-4 text-xs font-semibold text-gray-600">
                <button onclick="setLanguage('id')" id="btn-id" class="hover:text-blue-600 transition">IND</button>
                <span class="text-gray-300">|</span>
                <button onclick="setLanguage('en')" id="btn-en" class="hover:text-blue-600 transition">ENG</button>
                <span class="text-gray-300">|</span>
                <button onclick="setLanguage('ko')" id="btn-ko" class="hover:text-blue-600 transition">KOR</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-2xl font-bold text-gray-900">
                <span class="lang-id">Galeri Aktivitas TK Trans 2</span><span class="lang-en hidden">TK Trans 2 Activity Gallery</span><span class="lang-ko hidden">TK Trans 2 활동 갤러리</span>
            </h2>
            <p class="text-gray-500 text-xs mt-1">아이들의 즐거운 수업과 특별 활동 사진 앨범입니다.</p>
        </div>

        <div class="space-y-16">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex items-center space-x-2 mb-4 text-gray-900">
                    <i class="fas fa-calendar-alt text-indigo-500"></i>
                    <h3 class="font-bold text-lg">Kegiatan Kreatif & Doa Pagi</h3>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden"><img src="../images/tkt2_act1_1.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'"></div>
                    <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden"><img src="../images/tkt2_act1_2.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'"></div>
                    <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden"><img src="../images/tkt2_act1_3.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'"></div>
                    <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden"><img src="../images/tkt2_act1_4.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex items-center space-x-2 mb-4 text-gray-900">
                    <i class="fas fa-paint-brush text-indigo-500"></i>
                    <h3 class="font-bold text-lg">Seni, Musik, dan Bermain Bersama</h3>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden"><img src="../images/tkt2_act2_1.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'"></div>
                    <div class="aspect-square bg-gray-100 rounded-xl overflow-hidden"><img src="../images/tkt2_act2_2.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function setLanguage(lang) {
            document.querySelectorAll('.lang-id, .lang-en, .lang-ko').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.lang-' + lang).forEach(el => el.classList.remove('hidden'));
            ['id', 'en', 'ko'].forEach(l => {
                const btn = document.getElementById('btn-' + l);
                if(btn) { if (l === lang) btn.classList.add('text-blue-600', 'font-bold'); else btn.classList.remove('text-blue-600', 'font-bold'); }
            });
            localStorage.setItem('bbg-lang', lang);
        }
        document.addEventListener('DOMContentLoaded', () => { setLanguage(localStorage.getItem('bbg-lang') || 'id'); });
    </script>
</body>
</html>
